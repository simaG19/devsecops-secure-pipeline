name: Secure CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # GATE 1: Scan repository for hardcoded secrets
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: TruffleHog OSS Secret Scan
        uses: trufflesecurity/trufflehog@main
       
  # GATE 2: Static Analysis and Linting of the Dockerfile configuration
  docker-linting:
    name: Dockerfile Linting (Hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Hadolint Dockerfile Linter
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # GATE 3: Build Container and Scan CVEs
  vulnerability-scanning:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [secret-scanning, docker-linting] 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Local Docker Image
        run: |
          docker build -t secure-app:${{ github.sha }} .

      - name: Run Aqua Security Trivy Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'secure-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # GATE 4: Automated Build and Registry Push
  build-and-push:
    name: Build & Push Secure Image
    runs-on: ubuntu-latest
    needs: vulnerability-scanning
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Note: To push live images to GitHub Packages, uncomment the auth layers below.
      # - name: Log in to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Package Tagged Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false # Toggle to true once your registry credentials are wired up
          tags: ghcr.io/${{ github.repository }}/secure-app:latest